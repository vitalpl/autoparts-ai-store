<!DOCTYPE html>
<html lang="uk" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts AI — Адмін-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .table-scroll { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
        .table-scroll::-webkit-scrollbar { height: 4px; }
        .table-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-full antialiased">

    <!-- ===== HEADER ===== -->
    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur border-b border-slate-800">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
            <!-- Logo -->
            <div class="flex items-center gap-2 shrink-0">
                <svg class="w-7 h-7 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <circle cx="8" cy="17" r="1.5" fill="currentColor"/>
                    <circle cx="16" cy="17" r="1.5" fill="currentColor"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M1 17l2-9h18l2 9"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 8l1-4h12l1 4"/>
                </svg>
                <span class="text-lg font-extrabold tracking-tight">
                    Auto<span class="text-amber-400">Parts</span>
                    <span class="ml-1 text-xs font-semibold px-2 py-0.5 rounded-full bg-red-600/20 border border-red-500/30 text-red-400">Адмін</span>
                </span>
            </div>
            <!-- Admin info & nav -->
            <div class="flex items-center gap-3 text-sm">
                <span class="text-slate-400 hidden sm:inline">
                    Адміністратор: <span class="text-amber-400 font-semibold">{{ admin_user.imya }}</span>
                </span>
                <a href="/" class="px-3 py-1.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition text-sm">
                    ← На сайт
                </a>
                <form action="/api/logout" method="post">
                    <button type="submit"
                            class="px-3 py-1.5 rounded-lg text-slate-500 hover:bg-slate-800 hover:text-red-400 transition text-xs">
                        Вийти
                    </button>
                </form>
            </div>
        </div>
    </header>

    <!-- ===== MAIN LAYOUT ===== -->
    <div class="flex min-h-[calc(100vh-57px)]">

        <!-- ── Sidebar ── -->
        <aside class="w-56 shrink-0 border-r border-slate-800 bg-slate-900/50 p-4 hidden md:block">
            <nav class="space-y-1">
                <p class="text-xs font-bold text-slate-600 uppercase tracking-widest mb-3 px-2">Навігація</p>
                <a href="#products-section"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-red-600/10 border border-red-500/20 text-red-400 font-semibold text-sm">
                    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    Товари
                </a>
                <a href="/"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition text-sm">
                    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
                    </svg>
                    Головна
                </a>
            </nav>

            <!-- Stats block -->
            <div class="mt-6 space-y-3">
                <p class="text-xs font-bold text-slate-600 uppercase tracking-widest mb-3 px-2">Статистика</p>
                <div class="px-3 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                    <p class="text-xs text-slate-500">Всього товарів</p>
                    <p class="text-2xl font-extrabold text-amber-400">{{ products | length }}</p>
                </div>
                <div class="px-3 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                    <p class="text-xs text-slate-500">Категорій</p>
                    <p class="text-2xl font-extrabold text-emerald-400">{{ categories | length }}</p>
                </div>
            </div>
        </aside>

        <!-- ── Main Content ── -->
        <main class="flex-1 p-4 sm:p-6 overflow-x-hidden"
              x-data="adminPanel()"
              x-init="init()">

            <!-- Page title -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6" id="products-section">
                <div>
                    <h1 class="text-2xl font-extrabold">Управління товарами</h1>
                    <p class="text-slate-400 text-sm mt-1">Додавайте, редагуйте та видаляйте товари каталогу</p>
                </div>
                <button @click="openCreate()"
                        class="flex items-center gap-2 px-5 py-2.5 bg-amber-400 hover:bg-amber-300 text-slate-950 font-bold rounded-xl transition shrink-0 text-sm">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                    Додати новий товар
                </button>
            </div>

            <!-- Flash messages -->
            <div x-show="flashMsg" x-cloak
                 class="mb-4 px-4 py-3 rounded-xl text-sm font-medium border"
                 :class="flashOk
                     ? 'bg-emerald-400/10 border-emerald-400/30 text-emerald-400'
                     : 'bg-red-400/10 border-red-400/30 text-red-400'"
                 x-text="flashMsg">
            </div>

            <!-- Products Table -->
            <div class="bg-slate-900/50 border border-slate-800 rounded-2xl overflow-hidden">
                <div class="overflow-x-auto table-scroll">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-900/80">
                                <th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest w-8">#</th>
                                <th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest">Назва</th>
                                <th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest">Бренд</th>
                                <th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest">Артикул</th>
                                <th class="text-right px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest">Ціна, ₴</th>
                                <th class="text-right px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest">Склад</th>
                                <th class="text-center px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-widest">Дії</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-if="products.length === 0">
                                <tr>
                                    <td colspan="7" class="text-center py-12 text-slate-500">
                                        Товарів ще немає. Натисніть «Додати новий товар».
                                    </td>
                                </tr>
                            </template>
                            <template x-for="(p, idx) in products" :key="p.id">
                                <tr class="border-b border-slate-800/60 hover:bg-slate-800/30 transition">
                                    <td class="px-4 py-3 text-slate-600 font-mono text-xs" x-text="p.id"></td>
                                    <td class="px-4 py-3 font-medium max-w-[200px]">
                                        <p class="truncate" x-text="p.nazva"></p>
                                        <p class="text-xs text-slate-500 truncate" x-text="p.sumisnist || '—'"></p>
                                    </td>
                                    <td class="px-4 py-3">
                                        <span class="px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 text-slate-300 text-xs"
                                              x-text="p.brend"></span>
                                    </td>
                                    <td class="px-4 py-3 font-mono text-xs text-slate-400" x-text="p.artikul"></td>
                                    <td class="px-4 py-3 text-right font-bold text-amber-400" x-text="p.cina.toFixed(2)"></td>
                                    <td class="px-4 py-3 text-right">
                                        <span :class="p.kilkist_sklad > 0
                                            ? 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20'
                                            : 'text-red-400 bg-red-400/10 border-red-400/20'"
                                              class="px-2 py-0.5 rounded-full border text-xs font-semibold"
                                              x-text="p.kilkist_sklad + ' шт.'"></span>
                                    </td>
                                    <td class="px-4 py-3">
                                        <div class="flex items-center justify-center gap-2">
                                            <button @click="openEdit(p)"
                                                    class="px-3 py-1.5 text-xs font-semibold bg-blue-600/20 border border-blue-500/30 text-blue-400 hover:bg-blue-600/30 rounded-lg transition">
                                                Редагувати
                                            </button>
                                            <button @click="deleteProduct(p.id)"
                                                    class="px-3 py-1.5 text-xs font-semibold bg-red-600/20 border border-red-500/30 text-red-400 hover:bg-red-600/30 rounded-lg transition">
                                                Видалити
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ── Create / Edit Modal ── -->
            <div x-show="showModal" x-cloak
                 class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm"
                 @click.self="showModal = false">
                <div class="w-full max-w-lg bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl p-6 max-h-[90vh] overflow-y-auto">
                    <!-- Modal header -->
                    <div class="flex items-center justify-between mb-5">
                        <h2 class="text-lg font-extrabold" x-text="editId ? 'Редагувати товар' : 'Додати новий товар'"></h2>
                        <button @click="showModal = false"
                                class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Modal error -->
                    <div x-show="modalError" x-cloak
                         class="mb-4 px-3 py-2.5 bg-red-400/10 border border-red-400/30 rounded-xl text-red-400 text-sm"
                         x-text="modalError"></div>

                    <!-- Form -->
                    <form @submit.prevent="saveProduct()" class="space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="sm:col-span-2">
                                <label class="block text-xs text-slate-500 mb-1">Назва <span class="text-red-400">*</span></label>
                                <input x-model="form.nazva" type="text" required
                                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition"
                                       placeholder="Назва запчастини"/>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">Бренд <span class="text-red-400">*</span></label>
                                <input x-model="form.brend" type="text" required
                                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition"
                                       placeholder="Kayaba, Bosch..."/>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">Артикул <span class="text-red-400">*</span></label>
                                <input x-model="form.artikul" type="text" required
                                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition"
                                       placeholder="KYB-343250"/>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">Ціна, ₴ <span class="text-red-400">*</span></label>
                                <input x-model.number="form.cina" type="number" step="0.01" min="0" required
                                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition"
                                       placeholder="0.00"/>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">Кількість на складі</label>
                                <input x-model.number="form.kilkist_sklad" type="number" min="0"
                                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition"
                                       placeholder="0"/>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">Категорія</label>
                                <select x-model.number="form.katehoriya_id"
                                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition">
                                    <option value="" class="bg-slate-800">— Авто (перша) —</option>
                                    {% for cat in categories %}
                                    <option value="{{ cat.id }}" class="bg-slate-800">{{ cat.nazva }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-xs text-slate-500 mb-1">Сумісність</label>
                                <input x-model="form.sumisnist" type="text"
                                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition"
                                       placeholder="Passat B6, Audi A4 B8, Golf IV..."/>
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-xs text-slate-500 mb-1">Опис</label>
                                <textarea x-model="form.opys" rows="3"
                                          class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400 transition resize-none"
                                          placeholder="Детальний опис товару..."></textarea>
                            </div>
                        </div>
                        <div class="flex gap-3 pt-2">
                            <button type="button" @click="showModal = false"
                                    class="flex-1 py-2.5 rounded-xl border border-slate-700 text-slate-400 hover:text-slate-100 hover:border-slate-600 transition text-sm font-medium">
                                Скасувати
                            </button>
                            <button type="submit" :disabled="saving"
                                    class="flex-1 py-2.5 bg-amber-400 hover:bg-amber-300 disabled:opacity-50 text-slate-950 font-bold rounded-xl text-sm transition">
                                <span x-show="!saving" x-text="editId ? 'Зберегти зміни' : 'Додати товар'"></span>
                                <span x-show="saving">Збереження...</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('adminPanel', () => ({
                // Список товарів (завантажується через API)
                products: [],
                // Видимість модального вікна
                showModal: false,
                // ID товару при редагуванні (null — режим створення)
                editId: null,
                // Стан форми
                form: {
                    nazva: '', brend: '', artikul: '',
                    cina: 0, kilkist_sklad: 0,
                    sumisnist: '', opys: '', katehoriya_id: '',
                },
                // Повідомлення
                flashMsg: '',
                flashOk: true,
                modalError: '',
                saving: false,

                async init() {
                    await this.loadProducts();
                },

                async loadProducts() {
                    try {
                        const res = await fetch('/api/admin/products');
                        if (res.ok) {
                            this.products = await res.json();
                        } else {
                            this.showFlash('Помилка завантаження товарів', false);
                        }
                    } catch {
                        this.showFlash('Помилка з\'єднання із сервером', false);
                    }
                },

                openCreate() {
                    this.editId = null;
                    this.form = { nazva: '', brend: '', artikul: '', cina: 0, kilkist_sklad: 0, sumisnist: '', opys: '', katehoriya_id: '' };
                    this.modalError = '';
                    this.showModal = true;
                },

                openEdit(product) {
                    this.editId = product.id;
                    this.form = {
                        nazva: product.nazva,
                        brend: product.brend,
                        artikul: product.artikul,
                        cina: product.cina,
                        kilkist_sklad: product.kilkist_sklad,
                        sumisnist: product.sumisnist || '',
                        opys: product.opys || '',
                        katehoriya_id: product.katehoriya_id || '',
                    };
                    this.modalError = '';
                    this.showModal = true;
                },

                async saveProduct() {
                    this.saving = true;
                    this.modalError = '';
                    try {
                        const url = this.editId
                            ? `/api/admin/products/${this.editId}`
                            : '/api/admin/products';
                        const method = this.editId ? 'PUT' : 'POST';
                        const body = { ...this.form };
                        // Перетворення порожнього рядка katehoriya_id на null
                        if (!body.katehoriya_id) body.katehoriya_id = null;

                        const res = await fetch(url, {
                            method,
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body),
                        });
                        const data = await res.json();
                        if (res.ok) {
                            this.showModal = false;
                            await this.loadProducts();
                            this.showFlash(this.editId ? 'Товар успішно оновлено' : 'Товар успішно додано', true);
                        } else {
                            this.modalError = data.detail || 'Помилка збереження';
                        }
                    } catch {
                        this.modalError = 'Помилка з\'єднання із сервером';
                    } finally {
                        this.saving = false;
                    }
                },

                async deleteProduct(id) {
                    if (!confirm('Видалити цей товар? Дія незворотна.')) return;
                    try {
                        const res = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
                        if (res.ok) {
                            await this.loadProducts();
                            this.showFlash('Товар видалено', true);
                        } else {
                            const data = await res.json();
                            this.showFlash(data.detail || 'Помилка видалення', false);
                        }
                    } catch {
                        this.showFlash('Помилка з\'єднання із сервером', false);
                    }
                },

                showFlash(msg, ok = true) {
                    this.flashMsg = msg;
                    this.flashOk = ok;
                    setTimeout(() => { this.flashMsg = ''; }, 4000);
                },
            }));
        });
    </script>

</body>
</html>
